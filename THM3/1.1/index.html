<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Bảng Điểm</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .input-group { margin-bottom: 20px; }
        input { padding: 8px; margin-right: 10px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 8px 15px; cursor: pointer; background: #28a745; color: white; border: none; border-radius: 4px; }
        button:hover { background: #218838; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        th { background-color: #f4f4f4; }
        .btn-delete { background: #dc3545; padding: 5px 10px; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .btn-delete:hover { background: #c82333; }
        .highlight-yeu { background-color: #fff3cd; } 
        .summary { font-weight: bold; font-size: 1.1em; color: #333; }
    </style>
</head>
<body>

    <h2>Quản lý Điểm Sinh Viên</h2>

    <div class="input-group">
        <input type="text" id="name-input" placeholder="Nhập họ tên sinh viên...">
        <input type="number" id="score-input" placeholder="Điểm (0-10)" min="0" max="10" step="0.1">
        <button id="add-btn">Thêm</button>
    </div>

    <table id="grade-table">
        <thead>
            <tr>
                <th>STT</th>
                <th>Họ tên</th>
                <th>Điểm</th>
                <th>Xếp loại</th>
                <th>Thao tác</th>
            </tr>
        </thead>
        <tbody id="student-list">
            </tbody>
    </table>

    <div class="summary">
        Tổng số sinh viên: <span id="total-students">0</span> | 
        Điểm trung bình lớp: <span id="average-score">0.0</span>
    </div>

    <script src="main.js"></script>
</body>
</html>
