<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Bảng Điểm Pro</title>
    <style>
        body { font-family: sans-serif; padding: 20px; color: #333; }
        .toolbar, .input-group { margin-bottom: 20px; display: flex; gap: 10px; align-items: center; }
        input, select { padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 8px 15px; cursor: pointer; background: #28a745; color: white; border: none; border-radius: 4px; }
        button:hover { background: #218838; }
        
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        th { background-color: #f4f4f4; }
        
        #sort-score { cursor: pointer; user-select: none; }
        #sort-score:hover { background-color: #e2e2e2; }
        
        .btn-delete { background: #dc3545; padding: 5px 10px; }
        .btn-delete:hover { background: #c82333; }
        .highlight-yeu { background-color: #fff3cd; }
        .summary { font-weight: bold; font-size: 1.1em; }
        .empty-message { text-align: center; color: gray; font-style: italic; }
    </style>
</head>
<body>

    <h2>Quản lý Điểm Sinh Viên (Tìm kiếm & Lọc)</h2>

    <div class="input-group">
        <input type="text" id="name-input" placeholder="Nhập họ tên sinh viên...">
        <input type="number" id="score-input" placeholder="Điểm (0-10)" min="0" max="10" step="0.1">
        <button id="add-btn">Thêm</button>
    </div>

    <div class="toolbar" style="background: #f8f9fa; padding: 15px; border-radius: 5px; border: 1px solid #ddd;">
        <input type="text" id="search-input" placeholder="🔍 Tìm kiếm theo tên..." style="flex: 1;">
        <select id="filter-rank">
            <option value="All">Tất cả xếp loại</option>
            <option value="Giỏi">Giỏi</option>
            <option value="Khá">Khá</option>
            <option value="Trung bình">Trung bình</option>
            <option value="Yếu">Yếu</option>
        </select>
    </div>

    <table id="grade-table">
        <thead>
            <tr>
                <th>STT</th>
                <th>Họ tên</th>
                <th id="sort-score" title="Click để sắp xếp">Điểm <span id="sort-icon"></span></th>
                <th>Xếp loại</th>
                <th>Thao tác</th>
            </tr>
        </thead>
        <tbody id="student-list">
            </tbody>
    </table>

    <div class="summary">
        Đang hiển thị: <span id="total-students">0</span> sinh viên | 
        Điểm trung bình (danh sách hiện tại): <span id="average-score">0.0</span>
    </div>

    <script src="main.js"></script>
</body>
</html>
